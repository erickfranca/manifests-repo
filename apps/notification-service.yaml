apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: notification-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/erickfranca/manifests-repo.git
    targetRevision: main
    path: charts/notification-service
  destination:
    server: https://kubernetes.default.svc
    namespace: notification-service
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true