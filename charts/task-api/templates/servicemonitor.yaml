apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Namespace }}
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: {{ .Release.Namespace }} #service-label
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s